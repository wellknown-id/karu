<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karu Playground</title>
    <meta name="description" content="Interactive playground for testing Karu policy language">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>刈 Karu Playground</h1>
        <div class="header-actions">
            <select id="examples">
                <option value="">Load Example...</option>
                <option value="basic">Basic Access</option>
                <option value="abac">ABAC (Attributes)</option>
                <option value="deny">Deny Override</option>
                <option value="pattern">Pattern Matching</option>
            </select>
            <button id="transpile-btn" class="btn">Transpile to Cedar</button>
        </div>
    </header>

    <main>
        <div class="editors">
            <div class="editor-pane">
                <div class="pane-header">
                    <span>Policy</span>
                    <span class="status" id="policy-status"></span>
                </div>
                <textarea id="policy" spellcheck="false" placeholder="# Write your Karu policy here
allow access if
    principal.role == &quot;admin&quot;;">allow access if
    principal.role == "admin";</textarea>
            </div>
            <div class="editor-pane">
                <div class="pane-header">
                    <span>JSON Input</span>
                </div>
                <textarea id="input" spellcheck="false" placeholder='{
    "principal": { "role": "admin" },
    "action": "read",
    "resource": "document"
}'>{
    "principal": { "role": "admin" },
    "action": "read",
    "resource": "document"
}</textarea>
            </div>
        </div>

        <div id="result" class="result">
            <span class="loading">Loading WASM...</span>
        </div>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cedar Output</h2>
                <button id="modal-close" class="btn-close">&times;</button>
            </div>
            <pre id="cedar-output"></pre>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
