<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Bear ears -->
  <circle cx="7" cy="5" r="3.5" fill="#8B6914" stroke="#5C4400" stroke-width="0.5"/>
  <circle cx="7" cy="5" r="1.8" fill="#D4A843"/>
  <circle cx="17" cy="5" r="3.5" fill="#8B6914" stroke="#5C4400" stroke-width="0.5"/>
  <circle cx="17" cy="5" r="1.8" fill="#D4A843"/>
  <!-- Bear face -->
  <ellipse cx="12" cy="13" rx="8.5" ry="9" fill="#A67C2E" stroke="#5C4400" stroke-width="0.5"/>
  <!-- Inner face gradient -->
  <ellipse cx="12" cy="14" rx="5.5" ry="5" fill="#D4A843"/>
  <!-- Eyes -->
  <ellipse cx="9" cy="11" rx="1.2" ry="1.4" fill="#1a1a2e"/>
  <circle cx="9.3" cy="10.6" r="0.4" fill="white" opacity="0.8"/>
  <ellipse cx="15" cy="11" rx="1.2" ry="1.4" fill="#1a1a2e"/>
  <circle cx="15.3" cy="10.6" r="0.4" fill="white" opacity="0.8"/>
  <!-- Nose -->
  <ellipse cx="12" cy="14.5" rx="2" ry="1.3" fill="#3d2b1f"/>
  <ellipse cx="12" cy="14.2" rx="1" ry="0.5" fill="#5a4030" opacity="0.5"/>
  <!-- Mouth -->
  <path d="M12 15.8 Q10.5 17.5 10 17" stroke="#3d2b1f" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <path d="M12 15.8 Q13.5 17.5 14 17" stroke="#3d2b1f" stroke-width="0.6" fill="none" stroke-linecap="round"/>
</svg>
