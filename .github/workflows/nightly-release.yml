name: nightly-release

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - runner: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - runner: macos-15
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: .exe
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            binary_ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --locked --release --target ${{ matrix.target }} --bin karu --bin karu-lsp

      - name: Package karu archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/karu-${{ matrix.target }}.${{ matrix.archive_ext }} karu

      - name: Package karu archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/karu.exe" -DestinationPath "dist/karu-${{ matrix.target }}.${{ matrix.archive_ext }}" -Force

      - name: Upload karu release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-karu-${{ matrix.target }}
          path: dist/karu-${{ matrix.target }}.${{ matrix.archive_ext }}

      - name: Upload karu-lsp bundle input
        uses: actions/upload-artifact@v4
        with:
          name: vsix-karu-lsp-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/karu-lsp${{ matrix.binary_ext }}

  package-vsix:
    name: package-vsix
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: editors/vscode

      - name: Download bundled LSP binaries
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-karu-lsp-*
          path: /tmp/karu-vsix-artifacts

      - name: Stage self-contained binaries
        run: npm run build:vsix
        working-directory: editors/vscode
        env:
          KARU_VSIX_ARTIFACT_DIR: /tmp/karu-vsix-artifacts

      - name: Package VSIX
        run: npx @vscode/vsce package --allow-star-activation --skip-license --out /tmp/karu-nightly.vsix
        working-directory: editors/vscode

      - name: Upload VSIX release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-vsix
          path: /tmp/karu-nightly.vsix

  release:
    name: publish-nightly
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - package-vsix

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move nightly tag to this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate release metadata
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat > ../release-notes.md <<EOF
          Automated nightly build for commit \`${GITHUB_SHA}\`.

          Included assets:
          - \`karu\` CLI archives for Linux, macOS, and Windows on x64 + arm64
          - Self-contained VSIX with bundled \`karu-lsp\` binaries for all supported platforms
          - \`SHA256SUMS.txt\` for asset verification
          EOF

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Karu Nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body_path: release-notes.md
          files: |
            dist/*
