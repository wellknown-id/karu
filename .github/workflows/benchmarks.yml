name: benchmarks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BENCHMARK_REGRESSION_THRESHOLD_PERCENT: "30"

jobs:
  benchmark-regression-check:
    name: benchmark-regression-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crates/karu/benches/wasm_bench/package-lock.json

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Prepare base checkout
        if: github.event_name == 'pull_request'
        run: git worktree add /tmp/karu-base ${{ github.event.pull_request.base.sha }}

      - name: Run base benchmarks
        if: github.event_name == 'pull_request'
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/benchmarks/run_all.py" \
            --repo /tmp/karu-base \
            --output /tmp/karu-benchmarks/base.json \
            --ci

      - name: Run head benchmarks
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/benchmarks/run_all.py" \
            --repo "$GITHUB_WORKSPACE" \
            --output /tmp/karu-benchmarks/head.json \
            --ci

      - name: Compare base and head benchmarks
        id: compare
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/benchmarks/compare.py" \
            --base /tmp/karu-benchmarks/base.json \
            --head /tmp/karu-benchmarks/head.json \
            --output /tmp/karu-benchmarks/report.md \
            --threshold "${BENCHMARK_REGRESSION_THRESHOLD_PERCENT}"

      - name: Publish benchmark summary
        if: always() && github.event_name == 'pull_request'
        run: cat /tmp/karu-benchmarks/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on benchmark regressions
        if: github.event_name == 'pull_request' && steps.compare.outcome == 'failure'
        run: |
          echo "Benchmark regressions exceeded ${BENCHMARK_REGRESSION_THRESHOLD_PERCENT}%." >&2
          exit 1

      - name: Publish workflow-dispatch summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "# Benchmark run"
            echo
            echo "Generated benchmark results for \`${GITHUB_SHA}\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/karu-benchmarks
